name: sapahse
description: SapaHse - PT. Bukit Baiduri Energi HSE Reporting App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  mobile_scanner: ^7.2.0
  csv: ^8.0.0
  path_provider: ^2.1.2
  share_plus: ^12.0.2
  # ── API & Storage (newly added) ───────────────────────────────────────────
  http: ^1.2.1                    # HTTP requests to Laravel API
  shared_preferences: ^2.2.3     # Persist token & user data locally
  intl: ^0.20.2                  # Date formatting
  connectivity_plus: ^7.1.1      # Cloud Save: detect network connectivity
  url_launcher: ^6.3.2
  fl_chart: ^1.2.0
  flutter_image_compress: 2.4.0
  open_filex: ^4.5.0
  syncfusion_flutter_xlsio: ^33.2.3
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  web: ^1.1.1
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0

 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
 
flutter:
  uses-material-design: true
 
  assets:
    - assets/logo.png
    - assets/icon/
 
# ── App Icon Config ───────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21